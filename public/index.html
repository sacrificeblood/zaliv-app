<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>План залива</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; font-size: 13px; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: #2d3248; border-radius: 3px; }
.hdr { background: #1a1d27; border-bottom: 1px solid #2d3248; height: 52px; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
.hdr-logo { font-size: 15px; font-weight: 800; color: #fff; margin-right: 24px; }
.tabs { display: flex; height: 100%; align-items: flex-end; gap: 2px; }
.tab { padding: 0 18px; height: 38px; display: flex; align-items: center; font-size: 13px; font-weight: 500; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; user-select: none; }
.tab:hover { color: #e2e8f0; }
.tab.active { color: #fff; border-bottom-color: #7c3aed; }
.hdr-sep { flex: 1; }
.save-st { font-size: 11px; color: #475569; }
.page { display: none; height: calc(100vh - 52px); overflow: hidden; }
.page.active { display: flex; flex-direction: column; }

/* PLAN PAGE */
.plan-layout { display: flex; flex: 1; overflow: hidden; }
.src-panel { width: 220px; min-width: 220px; background: #1a1d27; border-right: 1px solid #2d3248; display: flex; flex-direction: column; overflow: hidden; }
.src-panel-head { padding: 12px 12px 6px; display: flex; align-items: center; justify-content: space-between; }
.sp-title { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .8px; }
.src-list { flex: 1; overflow-y: auto; padding: 4px 6px; }
.src-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; cursor: pointer; color: #94a3b8; transition: background .12s; margin-bottom: 1px; }
.src-item:hover { background: #252836; color: #e2e8f0; }
.src-item.sel { background: #252836; color: #fff; font-weight: 600; }
.src-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; pointer-events: none; }
.src-item-cnt { font-size: 10px; background: #1e293b; color: #475569; padding: 1px 5px; border-radius: 4px; flex-shrink: 0; pointer-events: none; }
.src-item-del { opacity: 0; color: #ef4444; font-size: 14px; cursor: pointer; width: 16px; text-align: center; flex-shrink: 0; }
.src-item:hover .src-item-del { opacity: 1; }
.sp-footer { padding: 8px 6px; border-top: 1px solid #2d3248; }
.plan-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* FORM */
.add-form { background: #141720; border-bottom: 1px solid #2d3248; padding: 14px 16px; flex-shrink: 0; }
.add-form-title { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label { font-size: 10px; color: #475569; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.fg input, .fg select { background: #0f1117; border: 1px solid #2d3248; border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 13px; outline: none; font-family: inherit; transition: border-color .15s; }
.fg input:focus, .fg select:focus { border-color: #6d28d9; }
.fg input::placeholder { color: #334155; }
.fg-input { width: 220px; }
.fg-creative { width: 150px; }
.fg-assist { width: 110px; }
.fg-src-and { width: 170px; }
.fg-src-ios { width: 170px; }
.fg-date { width: 130px; }
.form-hint { font-size: 11px; color: #334155; margin-top: 6px; }
.form-hint span { color: #6d28d9; font-family: monospace; }

.preview-area { margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap; }
.pchip { font-size: 11px; font-family: monospace; padding: 3px 8px; border-radius: 5px; cursor: pointer; border: 1px solid transparent; }
.pchip.and { background: #052e16; color: #4ade80; border-color: #14532d; }
.pchip.ios { background: #0c1a3d; color: #60a5fa; border-color: #1e3a5f; }
.pchip:hover { opacity: .7; }

/* CAMPS */
.plan-camps { flex: 1; overflow: auto; padding: 12px 16px; }
.plan-src-block { margin-bottom: 20px; }
.psb-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #1e293b; }
.psb-name { font-size: 13px; font-weight: 700; color: #fff; }
.psb-key { font-size: 10px; color: #334155; font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.psb-cnt { font-size: 10px; background: #1e293b; color: #475569; padding: 2px 6px; border-radius: 4px; }
.ic-btn { background: transparent; border: 1px solid #2d3248; color: #64748b; padding: 3px 8px; border-radius: 5px; font-size: 11px; cursor: pointer; }
.ic-btn:hover { background: #252836; color: #e2e8f0; }
.plt-group { margin-bottom: 6px; }
.plt-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; padding: 2px 0; }
.plt-label.and { color: #34d399; }
.plt-label.ios { color: #60a5fa; }
.camp-row { display: flex; align-items: center; gap: 6px; padding: 3px 4px; border-radius: 5px; }
.camp-row:hover { background: #1a1d27; }
.camp-neyming { flex: 1; font-size: 11px; font-family: monospace; color: #94a3b8; cursor: pointer; word-break: break-all; }
.camp-neyming:hover { color: #fff; }
.camp-date-label { font-size: 10px; color: #334155; flex-shrink: 0; white-space: nowrap; }
.camp-del-btn { opacity: 0; color: #ef4444; cursor: pointer; font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; }
.camp-row:hover .camp-del-btn { opacity: 1; }
.camp-status { font-size: 14px; cursor: pointer; flex-shrink: 0; user-select: none; }
.camp-status:hover { transform: scale(1.2); }
.camp-account { font-size: 10px; color: #475569; flex-shrink: 0; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.camp-account:hover { color: #94a3b8; }
.camp-account.empty { color: #2d3248; font-style: italic; }
.camp-comment { font-size: 10px; color: #475569; flex-shrink: 0; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.camp-comment:hover { color: #94a3b8; }
.camp-comment.empty { color: #2d3248; }
/* status in table */
.ze-status { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; flex-shrink: 0; white-space: nowrap; }
.ze-status.s-pending { display: none; }
.ze-status.s-ok { background: #052e16; color: #4ade80; }
.ze-status.s-ban { background: #450a0a; color: #f87171; }
.ze { border-left: 2px solid transparent; }
.ze.s-ok { border-left-color: #16a34a; }
.ze.s-ban { border-left-color: #dc2626; }
.ze-account { font-size: 10px; color: #334155; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ze-comment { font-size: 10px; color: #1e293b; font-style: italic; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* EDIT PANEL */
.ep-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; align-items: center; justify-content: center; }
.ep-ov.open { display: flex; }
.ep-box { background: #1a1d27; border: 1px solid #2d3248; border-radius: 12px; padding: 20px; width: 360px; max-width: 92vw; }
.ep-neyming { font-size: 11px; font-family: monospace; color: #64748b; margin-bottom: 14px; word-break: break-all; line-height: 1.5; border-bottom: 1px solid #1e293b; padding-bottom: 12px; }
.ep-label { font-size: 10px; color: #475569; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; margin-top: 12px; display: block; }
.ep-st-row { display: flex; gap: 8px; }
.ep-st-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: 2px solid #2d3248; font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; transition: all .15s; background: #0f1117; color: #475569; }
.ep-st-btn:hover { border-color: #475569; color: #e2e8f0; }
.ep-st-btn.sel-pending { border-color: #eab308; color: #eab308; background: #1c1a05; }
.ep-st-btn.sel-ok { border-color: #16a34a; color: #4ade80; background: #052e16; }
.ep-st-btn.sel-ban { border-color: #dc2626; color: #f87171; background: #450a0a; }
.ep-inp { width: 100%; background: #0f1117; border: 1px solid #2d3248; border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 13px; outline: none; font-family: inherit; }
.ep-inp:focus { border-color: #6d28d9; }
.ep-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.empty-msg { padding: 20px; text-align: center; color: #334155; font-size: 12px; }

/* TABLE PAGE */
.tbl-toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #2d3248; background: #1a1d27; flex-shrink: 0; flex-wrap: wrap; }
.tbl-title { font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
.date-tabs { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.dtab { padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #2d3248; color: #64748b; transition: all .15s; white-space: nowrap; }
.dtab:hover { border-color: #6d28d9; color: #a78bfa; }
.dtab.today { border-color: #4c1d95; color: #a78bfa; }
.dtab.active { background: #3b0764; border-color: #7c3aed; color: #e9d5ff; font-weight: 600; }
.tbl-wrap { flex: 1; overflow: auto; }
.ztbl { border-collapse: collapse; min-width: 100%; table-layout: fixed; }
.ztbl th { background: #1a1d27; border: 1px solid #2d3248; padding: 0; position: sticky; top: 0; z-index: 10; vertical-align: top; min-width: 190px; width: 200px; }
.ztbl th.th-num { width: 44px; min-width: 44px; }
.th-inner { padding: 8px 10px 7px; }
.th-src-name { font-size: 12px; font-weight: 700; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.th-src-key { font-size: 10px; color: #334155; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; }
.th-src-cnt { font-size: 10px; color: #475569; margin-top: 2px; }
.th-sub { background: #141720; border: 1px solid #2d3248; padding: 5px 8px; font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .5px; position: sticky; top: 52px; white-space: nowrap; }
.ztd { border: 1px solid #1e293b; padding: 6px 8px; vertical-align: top; background: #0f1117; font-size: 11px; }
.ztd-edit { cursor: pointer; }
.ztd-edit:hover { background: #1a1d27; }
.ztbl td { border: 1px solid #1e293b; padding: 0; vertical-align: top; background: #0f1117; }
.ztbl td.td-num { background: #141720; text-align: center; font-size: 11px; color: #334155; width: 44px; min-width: 44px; padding: 6px 0; }
.cell-inner { padding: 4px 6px; min-height: 30px; }
.ze { display: flex; align-items: flex-start; gap: 4px; padding: 2px; border-radius: 4px; cursor: pointer; }
.ze:hover { background: #1a1d27; }
.ze-plt { width: 13px; height: 13px; border-radius: 2px; font-size: 8px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.ze-plt.and { background: #052e16; color: #4ade80; }
.ze-plt.ios { background: #0c1a3d; color: #60a5fa; }
.ze-text { font-size: 11px; font-family: monospace; color: #94a3b8; flex: 1; line-height: 1.4; word-break: break-all; }
.ze:hover .ze-text { color: #fff; }
.no-data { padding: 60px; text-align: center; color: #334155; font-size: 13px; }

/* MODAL */
.modal-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; }
.modal-ov.open { display: flex; }
.modal { background: #1a1d27; border: 1px solid #2d3248; border-radius: 12px; padding: 22px; width: 380px; max-width: 92vw; }
.modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #fff; }
.modal label { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 3px; margin-top: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.modal input, .modal textarea { width: 100%; background: #0f1117; border: 1px solid #2d3248; border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 13px; outline: none; font-family: inherit; }
.modal textarea { min-height: 60px; resize: vertical; font-family: monospace; font-size: 11px; }
.modal input:focus, .modal textarea:focus { border-color: #6d28d9; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn { padding: 6px 12px; border-radius: 7px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; transition: all .15s; }
.btn-primary { background: #6d28d9; color: #fff; }
.btn-primary:hover { background: #7c3aed; }
.btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #2d3248; }
.btn-secondary:hover { background: #252836; color: #e2e8f0; }
.btn-sm { padding: 4px 9px; font-size: 11px; }
.btn-full { width: 100%; justify-content: center; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; border: 1px solid #2d3248; color: #e2e8f0; padding: 8px 14px; border-radius: 8px; font-size: 12px; z-index: 300; opacity: 0; transform: translateY(6px); transition: all .2s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok { border-color: #16a34a; color: #4ade80; }
.toast.err { border-color: #dc2626; color: #f87171; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">&#128640; План залива</div>
  <div class="tabs">
    <div class="tab active" id="tab-plan">&#9998; Создание плана</div>
    <div class="tab" id="tab-table">&#128203; Таблица залива</div>
  </div>
  <div class="hdr-sep"></div>
  <span class="save-st" id="save-st"></span>
</div>

<!-- PAGE 1 -->
<div class="page active" id="page-plan">
  <div class="plan-layout">
    <div class="src-panel">
      <div class="src-panel-head">
        <span class="sp-title">Источники</span>
        <button class="ic-btn" id="btn-src-top">+</button>
      </div>
      <div class="src-list" id="src-list"></div>
      <div class="sp-footer">
        <button class="btn btn-secondary btn-full btn-sm" id="btn-src-bot">+ Добавить источник</button>
      </div>
    </div>
    <div class="plan-main">
      <div class="add-form">
        <div class="add-form-title">Добавить кампании</div>
        <div class="form-row">
          <div class="fg" style="flex:1;min-width:280px">
            <label>ГЕО (через пробел)</label>
            <input type="text" id="fg-input" placeholder="CA2x1 ITEU2x1 UK1">
          </div>
          <div class="fg fg-creative">
            <label>Крео</label>
            <input type="text" id="fg-creative" placeholder="mrbizness, nalog...">
          </div>
          <div class="fg fg-assist">
            <label>Ник (опц.)</label>
            <input type="text" id="fg-assist" placeholder="burmalda">
          </div>
          <div class="fg fg-src-and">
            <label>Источник Android</label>
            <select id="fg-src-and"></select>
          </div>
          <div class="fg fg-src-ios">
            <label>Источник iOS</label>
            <select id="fg-src-ios"></select>
          </div>
          <div class="fg fg-date">
            <label>Дата</label>
            <input type="date" id="fg-date">
          </div>
          <div class="fg" style="justify-content:flex-end">
            <button class="btn btn-primary" id="btn-add">Добавить</button>
          </div>
        </div>
        <div class="form-hint">
          Формат: <span>CA2x1</span> = CA 2 Android 1 iOS &nbsp;|&nbsp; <span>UK3</span> = UK 3 Android &nbsp;|&nbsp; несколько: <span>CA2x1 ITEU2x1 UK1</span>
        </div>
        <div class="preview-area" id="preview-area"></div>
      </div>
      <div class="plan-camps" id="plan-camps">
        <div class="empty-msg">Добавь источник чтобы начать</div>
      </div>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page-table">
  <div class="tbl-toolbar">
    <span class="tbl-title">Таблица залива</span>
    <div class="date-tabs" id="date-tabs"></div>
  </div>
  <div class="tbl-wrap" id="tbl-wrap">
    <div class="no-data">Добавь кампании чтобы увидеть таблицу</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-ov" id="m-src">
  <div class="modal">
    <h3 id="m-src-title">Новый источник</h3>
    <label>Название</label>
    <input type="text" id="inp-src-name" placeholder="OUR APPS CHICKEN">
    <label>Ключ / ссылка (необязательно)</label>
    <textarea id="inp-src-key" placeholder="bndrnt000612&key=..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="btn-cancel-src">Отмена</button>
      <button class="btn btn-primary" id="btn-save-src">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- EDIT PANEL -->
<div class="ep-ov" id="ep-ov">
  <div class="ep-box">
    <div class="ep-neyming" id="ep-neyming"></div>
    <span class="ep-label">Статус</span>
    <div class="ep-st-row">
      <button class="ep-st-btn" id="ep-pending">В процессе</button>
      <button class="ep-st-btn" id="ep-ok">Прошло</button>
      <button class="ep-st-btn" id="ep-ban">Бан</button>
    </div>
    <span class="ep-label">Аккаунт</span>
    <input type="text" class="ep-inp" id="ep-account" placeholder="название аккаунта">
    <span class="ep-label">Комментарий</span>
    <input type="text" class="ep-inp" id="ep-comment" placeholder="заметка...">
    <div class="ep-btns">
      <button class="btn btn-secondary" id="ep-cancel">Отмена</button>
      <button class="btn btn-primary" id="ep-save">Сохранить</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var sources = [];
  var campaigns = [];
  var selSrcId = null;
  var editSrcId = null;
  var activeDateTab = null;
  var toastTimer = null;

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2500);
  }
  function setSt(msg) {
    var el = document.getElementById('save-st');
    if (el) el.textContent = msg;
  }
  function kievToday() {
    var now = new Date();
    var kyiv = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Kiev' }));
    return kyiv.getFullYear() + '-' + String(kyiv.getMonth()+1).padStart(2,'0') + '-' + String(kyiv.getDate()).padStart(2,'0');
  }
  function fmtDate(d) {
    if (!d) return '';
    var s = String(d).slice(0,10);
    var p = s.split('-');
    var label = p[2] + '.' + p[1] + '.' + p[0];
    if (s === kievToday()) return label + ' (сегодня)';
    return label;
  }
  async function req(url, method, body) {
    var opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    var r = await fetch(url, opts);
    if (!r.ok) throw new Error(await r.text());
    if ((method||'GET') === 'DELETE') return null;
    return r.json();
  }

  // TABS
  document.getElementById('tab-plan').addEventListener('click', function () {
    document.getElementById('tab-plan').classList.add('active');
    document.getElementById('tab-table').classList.remove('active');
    document.getElementById('page-plan').classList.add('active');
    document.getElementById('page-table').classList.remove('active');
  });
  document.getElementById('tab-table').addEventListener('click', function () {
    document.getElementById('tab-table').classList.add('active');
    document.getElementById('tab-plan').classList.remove('active');
    document.getElementById('page-table').classList.add('active');
    document.getElementById('page-plan').classList.remove('active');
    loadTablePage();
  });

  // MODAL
  function openModal() { document.getElementById('m-src').classList.add('open'); }
  function closeModal() { document.getElementById('m-src').classList.remove('open'); }
  document.getElementById('btn-cancel-src').addEventListener('click', closeModal);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

  function openNewSrc() {
    editSrcId = null;
    document.getElementById('m-src-title').textContent = 'Новый источник';
    document.getElementById('inp-src-name').value = '';
    document.getElementById('inp-src-key').value = '';
    openModal();
    setTimeout(function () { document.getElementById('inp-src-name').focus(); }, 60);
  }
  function openEditSrc(id) {
    var s = sources.find(function (x) { return x.id === id; });
    if (!s) return;
    editSrcId = id;
    document.getElementById('m-src-title').textContent = 'Редактировать источник';
    document.getElementById('inp-src-name').value = s.name;
    document.getElementById('inp-src-key').value = s.key_link || '';
    openModal();
    setTimeout(function () { document.getElementById('inp-src-name').focus(); }, 60);
  }
  document.getElementById('btn-src-top').addEventListener('click', openNewSrc);
  document.getElementById('btn-src-bot').addEventListener('click', openNewSrc);

  document.getElementById('btn-save-src').addEventListener('click', async function () {
    var name = document.getElementById('inp-src-name').value.trim();
    var key = document.getElementById('inp-src-key').value.trim();
    if (!name) { toast('Введи название', 'err'); return; }
    try {
      if (editSrcId) {
        var s = await req('/api/sources/' + editSrcId, 'PATCH', { name: name, key_link: key });
        var i = sources.findIndex(function (x) { return x.id === editSrcId; });
        if (i !== -1) sources[i] = s;
      } else {
        var s = await req('/api/sources', 'POST', { name: name, key_link: key });
        sources.push(s);
      }
      closeModal();
      renderSrcPanel();
      renderSrcSelects();
      toast('Сохранено', 'ok');
    } catch (e) { toast('Ошибка: ' + e.message, 'err'); }
  });

  async function deleteSrc(id) {
    if (!confirm('Удалить источник?')) return;
    try {
      await req('/api/sources/' + id, 'DELETE');
      sources = sources.filter(function (s) { return s.id !== id; });
      campaigns = campaigns.filter(function (c) { return c.source_id !== id; });
      if (selSrcId === id) selSrcId = null;
      renderSrcPanel();
      renderSrcSelects();
      renderPlanCamps();
    } catch (e) { toast('Ошибка', 'err'); }
  }

  function renderSrcPanel() {
    var list = document.getElementById('src-list');
    var html = '';
    sources.forEach(function (s) {
      var cnt = campaigns.filter(function (c) { return c.source_id === s.id; }).length;
      html += '<div class="src-item' + (selSrcId === s.id ? ' sel' : '') + '" data-id="' + s.id + '">'
        + '<span class="src-item-name">' + esc(s.name) + '</span>'
        + '<span class="src-item-cnt">' + cnt + '</span>'
        + '<span class="src-item-del" data-del="' + s.id + '">&times;</span>'
        + '</div>';
    });
    list.innerHTML = html;
    list.querySelectorAll('.src-item').forEach(function (item) {
      item.addEventListener('click', function (e) {
        var del = e.target.getAttribute('data-del');
        if (del) { deleteSrc(parseInt(del)); return; }
        var id = parseInt(item.getAttribute('data-id'));
        selSrcId = selSrcId === id ? null : id;
        renderSrcPanel();
        renderPlanCamps();
      });
    });
  }

  function renderSrcSelects() {
    var opts = sources.map(function (s) {
      return '<option value="' + s.id + '">' + esc(s.name) + '</option>';
    }).join('');
    document.getElementById('fg-src-and').innerHTML = opts;
    document.getElementById('fg-src-ios').innerHTML = opts;
  }

  // NEYMING
  function buildN(geo, creative, asst, platform) {
    var parts = [geo, creative, 'm1non'];
    if (asst) parts.push(asst);
    if (platform === 'ios') parts.push('IOS');
    parts.push('{{random.digits.5}}');
    parts.push('{{date}}');
    return parts.join('x');
  }

  // Parse "CA2x1 ITEU2x1 UK3" -> array of {geo, android, ios}
  function parseInput(raw) {
    var blocks = raw.trim().split(/\s+/);
    var result = [];
    blocks.forEach(function(block) {
      if (!block) return;
      // Match: letters (GEO) + digits (android) + optional "x" + digits (ios)
      var m = block.match(/^([A-Za-z]+)(\d+)(?:x(\d+))?$/);
      if (!m) return;
      var geo = m[1].toUpperCase();
      var android = parseInt(m[2]) || 0;
      var ios = m[3] ? (parseInt(m[3]) || 0) : 0;
      if (geo && (android > 0 || ios > 0)) {
        result.push({ geo: geo, android: android, ios: ios });
      }
    });
    return result.length ? result : null;
  }

  function updatePreview() {
    var raw = document.getElementById('fg-input').value;
    var cr = document.getElementById('fg-creative').value.trim();
    var as = document.getElementById('fg-assist').value.trim();
    var area = document.getElementById('preview-area');
    if (!raw || !cr) { area.innerHTML = ''; return; }
    var parsed = parseInput(raw);
    if (!parsed) { area.innerHTML = ''; return; }
    var html = '';
    parsed.forEach(function(p) {
      for (var i = 0; i < p.android; i++) {
        var n = buildN(p.geo, cr, as, 'android');
        html += '<span class="pchip and" data-n="' + esc(n) + '">A/' + esc(p.geo) + ': ' + esc(n) + '</span>';
      }
      for (var i = 0; i < p.ios; i++) {
        var n = buildN(p.geo, cr, as, 'ios');
        html += '<span class="pchip ios" data-n="' + esc(n) + '">I/' + esc(p.geo) + ': ' + esc(n) + '</span>';
      }
    });
    area.innerHTML = html;
    area.querySelectorAll('.pchip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        navigator.clipboard.writeText(chip.getAttribute('data-n')).then(function () { toast('Скопировано', 'ok'); });
      });
    });
  }

  ['fg-input', 'fg-creative', 'fg-assist'].forEach(function (id) {
    document.getElementById(id).addEventListener('input', updatePreview);
  });
  document.getElementById('fg-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('btn-add').click();
  });

  // ADD
  document.getElementById('btn-add').addEventListener('click', async function () {
    var raw = document.getElementById('fg-input').value;
    var cr = document.getElementById('fg-creative').value.trim();
    var as = document.getElementById('fg-assist').value.trim();
    var srcAndId = parseInt(document.getElementById('fg-src-and').value);
    var srcIosId = parseInt(document.getElementById('fg-src-ios').value);
    var plan_date = document.getElementById('fg-date').value || kievToday();

    if (!raw) { toast('Заполни поле ГЕО', 'err'); return; }
    if (!cr) { toast('Заполни крео', 'err'); return; }
    if (!srcAndId) { toast('Создай источник сначала', 'err'); return; }

    var parsed = parseInput(raw);
    if (!parsed) { toast('Формат: CA2x1 ITEU2 UK1x2', 'err'); return; }

    var toAdd = [];
    parsed.forEach(function(p) {
      for (var i = 0; i < p.android; i++) {
        var n = buildN(p.geo, cr, as, 'android');
        toAdd.push({ source_id: srcAndId, geo: p.geo, creative: cr, assistant: as, platform: 'android', neyming: n });
      }
      for (var i = 0; i < p.ios; i++) {
        var n = buildN(p.geo, cr, as, 'ios');
        toAdd.push({ source_id: srcIosId, geo: p.geo, creative: cr, assistant: as, platform: 'ios', neyming: n });
      }
    });

    if (!toAdd.length) { toast('Нечего добавлять', 'err'); return; }

    setSt('Сохранение...');
    try {
      for (var j = 0; j < toAdd.length; j++) {
        var saved = await req('/api/campaigns', 'POST', Object.assign({ plan_date: plan_date }, toAdd[j]));
        campaigns.push(saved);
      }
      setSt('Сохранено ✓');
      setTimeout(function () { setSt(''); }, 2000);
      document.getElementById('fg-input').value = '';
      document.getElementById('preview-area').innerHTML = '';
      renderSrcPanel();
      renderPlanCamps();
      toast('Добавлено ' + toAdd.length + ' кампаний', 'ok');
    } catch (e) { toast('Ошибка: ' + e.message, 'err'); setSt(''); }
  });

  async function delCamp(id) {
    try {
      await req('/api/campaigns/' + id, 'DELETE');
      campaigns = campaigns.filter(function (c) { return c.id !== id; });
      renderSrcPanel();
      renderPlanCamps();
    } catch (e) { toast('Ошибка', 'err'); }
  }

  function renderPlanCamps() {
    var area = document.getElementById('plan-camps');
    var shown = selSrcId ? sources.filter(function (s) { return s.id === selSrcId; }) : sources;
    if (!sources.length) { area.innerHTML = '<div class="empty-msg">Добавь источник чтобы начать</div>'; return; }
    var html = '';
    shown.forEach(function (src) {
      var sc = campaigns.filter(function (c) { return c.source_id === src.id; });
      var and = sc.filter(function (c) { return c.platform === 'android'; });
      var ios = sc.filter(function (c) { return c.platform === 'ios'; });
      html += '<div class="plan-src-block">'
        + '<div class="psb-head">'
        + '<span class="psb-name">' + esc(src.name) + '</span>'
        + (src.key_link ? '<span class="psb-key">' + esc(src.key_link) + '</span>' : '')
        + '<span class="psb-cnt">' + sc.length + '</span>'
        + '<button class="ic-btn" data-copy-src="' + src.id + '">&#128203; Копировать все</button>'
        + '<button class="ic-btn" data-edit-src="' + src.id + '">&#9998;</button>'
        + '</div>';
      if (!sc.length) html += '<div style="color:#334155;font-size:12px;padding:4px 0">Нет кампаний</div>';
      if (and.length) {
        html += '<div class="plt-group"><div class="plt-label and">Android (' + and.length + ')</div>';
        and.forEach(function (c) { html += campRow(c); });
        html += '</div>';
      }
      if (ios.length) {
        html += '<div class="plt-group"><div class="plt-label ios">iOS (' + ios.length + ')</div>';
        ios.forEach(function (c) { html += campRow(c); });
        html += '</div>';
      }
      html += '</div>';
    });
    area.innerHTML = html;
    area.querySelectorAll('[data-copy-src]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var sid = parseInt(btn.getAttribute('data-copy-src'));
        var list = campaigns.filter(function (c) { return c.source_id === sid; }).map(function (c) { return c.neyming; });
        navigator.clipboard.writeText(list.join('\n')).then(function () { toast('Скопировано ' + list.length, 'ok'); });
      });
    });
    area.querySelectorAll('[data-edit-src]').forEach(function (btn) {
      btn.addEventListener('click', function () { openEditSrc(parseInt(btn.getAttribute('data-edit-src'))); });
    });
    area.querySelectorAll('[data-copy-camp]').forEach(function (el) {
      el.addEventListener('click', function () {
        navigator.clipboard.writeText(el.getAttribute('data-copy-camp')).then(function () { toast('Скопировано', 'ok'); });
      });
    });
    area.querySelectorAll('[data-del-camp]').forEach(function (btn) {
      btn.addEventListener('click', function () { delCamp(parseInt(btn.getAttribute('data-del-camp'))); });
    });
    area.querySelectorAll('[data-cycle]').forEach(function (btn) {
      btn.addEventListener('click', function () { cycleStatus(parseInt(btn.getAttribute('data-cycle'))); });
    });
    area.querySelectorAll('[data-edit-account]').forEach(function (el) {
      el.addEventListener('click', function () {
        var id = parseInt(el.getAttribute('data-edit-account'));
        var c = campaigns.find(function(x) { return x.id === id; });
        editField(id, 'account', c ? c.account : '');
      });
    });
    area.querySelectorAll('[data-edit-comment]').forEach(function (el) {
      el.addEventListener('click', function () {
        var id = parseInt(el.getAttribute('data-edit-comment'));
        var c = campaigns.find(function(x) { return x.id === id; });
        editField(id, 'comment', c ? c.comment : '');
      });
    });
  }

  function statusEmoji(s) {
    if (s === 'ok') return '🟢';
    if (s === 'ban') return '🔴';
    return '🟡';
  }
  function nextStatus(s) {
    if (s === 'pending') return 'ok';
    if (s === 'ok') return 'ban';
    return 'pending';
  }

  async function cycleStatus(id) {
    var c = campaigns.find(function(x) { return x.id === id; });
    if (!c) return;
    var newStatus = nextStatus(c.status || 'pending');
    try {
      var saved = await req('/api/campaigns/' + id, 'PATCH', { status: newStatus, comment: c.comment || '', account: c.account || '' });
      var i = campaigns.findIndex(function(x) { return x.id === id; });
      if (i !== -1) campaigns[i] = saved;
      renderPlanCamps();
    } catch(e) { toast('Ошибка', 'err'); }
  }

  function editField(id, field, current) {
    var val = prompt(field === 'account' ? 'Аккаунт:' : 'Комментарий:', current || '');
    if (val === null) return;
    var c = campaigns.find(function(x) { return x.id === id; });
    if (!c) return;
    var update = { status: c.status || 'pending', comment: c.comment || '', account: c.account || '' };
    update[field] = val;
    req('/api/campaigns/' + id, 'PATCH', update).then(function(saved) {
      var i = campaigns.findIndex(function(x) { return x.id === id; });
      if (i !== -1) campaigns[i] = saved;
      renderPlanCamps();
    }).catch(function() { toast('Ошибка', 'err'); });
  }

  function campRow(c) {
    return '<div class="camp-row">'
      + '<span class="camp-neyming" data-copy-camp="' + esc(c.neyming) + '">' + esc(c.neyming) + '</span>'
      + '<span class="camp-date-label">' + fmtDate(c.plan_date) + '</span>'
      + '<span class="camp-del-btn" data-del-camp="' + c.id + '">&times;</span>'
      + '</div>';
  }

  // TABLE PAGE
  async function loadTablePage() {
    try {
      var dates = await req('/api/dates');
      var today = kievToday();
      if (!activeDateTab && dates.length) {
        activeDateTab = dates.indexOf(today) !== -1 ? today : dates[0];
      }
      renderDateTabs(dates);
      if (activeDateTab) loadTableDate(activeDateTab);
      else document.getElementById('tbl-wrap').innerHTML = '<div class="no-data">Нет данных</div>';
    } catch (e) { toast('Ошибка загрузки', 'err'); }
  }

  function renderDateTabs(dates) {
    var el = document.getElementById('date-tabs');
    var today = kievToday();
    el.innerHTML = dates.map(function (d) {
      var cls = '';
      if (d === today) cls += ' today';
      if (d === activeDateTab) cls += ' active';
      return '<div class="dtab' + cls + '" data-d="' + d + '">' + fmtDate(d) + '</div>';
    }).join('');
    el.querySelectorAll('.dtab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        activeDateTab = tab.getAttribute('data-d');
        renderDateTabs(dates);
        loadTableDate(activeDateTab);
      });
    });
  }

  async function loadTableDate(date) {
    var wrap = document.getElementById('tbl-wrap');
    wrap.innerHTML = '<div style="padding:40px;text-align:center;color:#475569">Загрузка...</div>';
    try {
      var dc = await req('/api/campaigns?date=' + date);
      if (!dc.length) { wrap.innerHTML = '<div class="no-data">Нет кампаний за ' + fmtDate(date) + '</div>'; return; }
      var srcIds = [];
      dc.forEach(function (c) { if (c.source_id && srcIds.indexOf(c.source_id) === -1) srcIds.push(c.source_id); });
      var shown = sources.filter(function (s) { return srcIds.indexOf(s.id) !== -1; });
      if (!shown.length) shown = srcIds.map(function (id) { return { id: id, name: 'Источник ' + id, key_link: '' }; });
      var cols = {};
      shown.forEach(function (s) {
        var and = dc.filter(function (c) { return c.source_id === s.id && c.platform === 'android'; });
        var ios = dc.filter(function (c) { return c.source_id === s.id && c.platform === 'ios'; });
        cols[s.id] = and.concat(ios);
      });
      var maxR = 0;
      shown.forEach(function (s) { if (cols[s.id].length > maxR) maxR = cols[s.id].length; });

      // Build table: per source = 3 cols: Кампания | Аккаунт | Статус
      var html = '<table class="ztbl"><thead><tr><th class="th-num"></th>';
      shown.forEach(function (s) {
        html += '<th colspan="3"><div class="th-inner">'
          + '<div class="th-src-name">' + esc(s.name) + '</div>'
          + (s.key_link ? '<div class="th-src-key">' + esc(s.key_link) + '</div>' : '')
          + '<div class="th-src-cnt">' + cols[s.id].length + ' кампаний</div>'
          + '</div></th>';
      });
      html += '</tr><tr><th class="th-num"></th>';
      shown.forEach(function () {
        html += '<th class="th-sub">Кампания</th><th class="th-sub" style="width:110px;min-width:110px">Аккаунт</th><th class="th-sub" style="width:90px;min-width:90px">Статус</th>';
      });
      html += '</tr></thead><tbody>';

      for (var i = 0; i < maxR; i++) {
        html += '<tr><td class="td-num">' + (i+1) + '</td>';
        shown.forEach(function (s) {
          var c = cols[s.id][i];
          var src = sources.find(function(x) { return x.id === s.id; }) || s;
          if (c) {
            var st = c.status || 'pending';
            var stLabel = st === 'ok' ? 'Прошло' : st === 'ban' ? 'Бан' : '—';
            var stColor = st === 'ok' ? '#4ade80' : st === 'ban' ? '#f87171' : '#475569';
            var stBg = st === 'ok' ? '#052e16' : st === 'ban' ? '#450a0a' : 'transparent';
            var stBorder = st === 'ok' ? '#14532d' : st === 'ban' ? '#7f1d1d' : '#2d3248';
            // Кампания cell - click to copy with sub3
            html += '<td class="ztd" data-copy-camp="' + c.id + '" data-neyming="' + esc(c.neyming) + '" data-src-key="' + esc(src.key_link || '') + '" title="Нажми чтобы скопировать ссылку">'
              + '<div style="display:flex;align-items:flex-start;gap:4px">'
              + '<div class="ze-plt ' + (c.platform === 'ios' ? 'ios' : 'and') + '">' + (c.platform === 'ios' ? 'I' : 'A') + '</div>'
              + '<div style="font-size:11px;font-family:monospace;color:#94a3b8;word-break:break-all;line-height:1.4">' + esc(c.neyming) + '</div>'
              + '</div>'
              + '</td>';
            // Аккаунт cell - click to edit
            html += '<td class="ztd ztd-edit" data-open-ep="' + c.id + '" title="Кликни чтобы редактировать">'
              + '<span style="font-size:11px;color:' + (c.account ? '#64748b' : '#2d3248') + '">' + esc(c.account || '—') + '</span>'
              + (c.comment ? '<div style="font-size:10px;color:#334155;font-style:italic;margin-top:2px">' + esc(c.comment) + '</div>' : '')
              + '</td>';
            // Статус cell - click to edit
            html += '<td class="ztd ztd-edit" data-open-ep="' + c.id + '">'
              + '<span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;border:1px solid ' + stBorder + ';background:' + stBg + ';color:' + stColor + '">' + stLabel + '</span>'
              + '</td>';
          } else {
            html += '<td class="ztd"></td><td class="ztd"></td><td class="ztd"></td>';
          }
        });
        html += '</tr>';
      }
      html += '</tbody></table>';
      wrap.innerHTML = html;

      // Copy camp: click on campaign cell
      wrap.querySelectorAll('[data-copy-camp]').forEach(function (el) {
        el.addEventListener('click', function () {
          var neyming = el.getAttribute('data-neyming');
          var keyLink = el.getAttribute('data-src-key');
          var result = (keyLink && keyLink.indexOf('{sub3}') !== -1)
            ? keyLink.replace('{sub3}', neyming)
            : neyming;
          navigator.clipboard.writeText(result).then(function () { toast('Скопировано', 'ok'); });
        });
      });

      // Open edit panel on status cell click
      wrap.querySelectorAll('[data-open-ep]').forEach(function (el) {
        el.addEventListener('click', function () {
          var cid = parseInt(el.getAttribute('data-open-ep'));
          openEditPanel(cid, dc);
        });
      });

    } catch (e) { wrap.innerHTML = '<div class="no-data">Ошибка загрузки</div>'; }
  }

  // EDIT PANEL
  var epCampId = null;
  var epStatus = 'pending';
  var epDateCamps = [];

  function openEditPanel(id, dateCamps) {
    epCampId = id;
    epDateCamps = dateCamps;
    var c = dateCamps.find(function(x) { return x.id === id; });
    if (!c) return;
    epStatus = c.status || 'pending';
    document.getElementById('ep-neyming').textContent = c.neyming;
    document.getElementById('ep-account').value = c.account || '';
    document.getElementById('ep-comment').value = c.comment || '';
    updateEpButtons();
    document.getElementById('ep-ov').classList.add('open');
    setTimeout(function() { document.getElementById('ep-account').focus(); }, 60);
  }

  function updateEpButtons() {
    ['pending','ok','ban'].forEach(function(s) {
      var btn = document.getElementById('ep-' + s);
      btn.className = 'ep-st-btn' + (epStatus === s ? ' sel-' + s : '');
    });
  }

  document.getElementById('ep-pending').addEventListener('click', function() { epStatus='pending'; updateEpButtons(); });
  document.getElementById('ep-ok').addEventListener('click', function() { epStatus='ok'; updateEpButtons(); });
  document.getElementById('ep-ban').addEventListener('click', function() { epStatus='ban'; updateEpButtons(); });
  document.getElementById('ep-cancel').addEventListener('click', function() { document.getElementById('ep-ov').classList.remove('open'); });

  document.getElementById('ep-save').addEventListener('click', async function() {
    var account = document.getElementById('ep-account').value.trim();
    var comment = document.getElementById('ep-comment').value.trim();
    try {
      var saved = await req('/api/campaigns/' + epCampId, 'PATCH', { status: epStatus, account: account, comment: comment });
      // update in campaigns array
      var i = campaigns.findIndex(function(x) { return x.id === epCampId; });
      if (i !== -1) campaigns[i] = Object.assign(campaigns[i], saved);
      // update in dateCamps
      var j = epDateCamps.findIndex(function(x) { return x.id === epCampId; });
      if (j !== -1) epDateCamps[j] = Object.assign(epDateCamps[j], saved);
      document.getElementById('ep-ov').classList.remove('open');
      loadTableDate(activeDateTab);
      toast('Сохранено', 'ok');
    } catch(e) { toast('Ошибка', 'err'); }
  });

  // INIT
  async function init() {
    document.getElementById('fg-date').value = kievToday();
    try {
      sources = await req('/api/sources');
      campaigns = await req('/api/campaigns');
      renderSrcPanel();
      renderSrcSelects();
      renderPlanCamps();
    } catch (e) { toast('Ошибка подключения к серверу', 'err'); }
  }

  init();
}());
</script>
</body>
</html>
